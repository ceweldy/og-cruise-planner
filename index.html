<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OG Cruise Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header class="top">
      <h1>OG Cruise Planner</h1>
      <div class="legend">
        <span class="dot"></span>
        <span>Blocked date</span>
      </div>
    </header>

    <section class="card controls">
      <label>
        Pick your name
        <select id="nameInput">
          <option value="">Select name...</option>
          <option>Connor</option>
          <option>Alexa</option>
          <option>Taher</option>
          <option>Breidy</option>
          <option>Sumer</option>
          <option>Isa</option>
          <option>Renata</option>
          <option>Julissa</option>
        </select>
      </label>
      <p>Click any day to block it. Click your own block to remove it.</p>
    </section>

    <section id="months" class="months"></section>
  </main>

  <div id="passcodeGate" class="gate">
    <div class="gate-card">
      <h2>Enter Passcode</h2>
      <p>This planner is shared, enter the code to continue.</p>
      <input id="passcodeInput" type="password" placeholder="Passcode" autofocus />
      <button id="passcodeBtn">Unlock</button>
      <div id="passcodeError" class="gate-error"></div>
    </div>
  </div>

  <template id="monthTemplate">
    <article class="month card">
      <h2 class="month-title"></h2>
      <div class="weekdays"></div>
      <div class="days"></div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
